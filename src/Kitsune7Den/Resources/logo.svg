<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Gear/Cog outer ring with teeth -->
  <g transform="translate(256,256)">
    <!-- Gear teeth (12 teeth) -->
    <g fill="#e94560">
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(0)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(30)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(60)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(90)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(120)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(150)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(180)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(210)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(240)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(270)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(300)"/>
      <rect x="-28" y="-245" width="56" height="50" rx="6" transform="rotate(330)"/>
    </g>

    <!-- Gear body (outer circle) -->
    <circle cx="0" cy="0" r="210" fill="#e94560"/>

    <!-- Inner dark circle -->
    <circle cx="0" cy="0" r="185" fill="url(#gearGrad)"/>
  </g>

  <!-- Fox face -->
  <g transform="translate(256,270)">
    <!-- Ears -->
    <polygon points="-100,-120 -70,-210 -30,-130" fill="#e94560"/>
    <polygon points="100,-120 70,-210 30,-130" fill="#e94560"/>
    <!-- Inner ears -->
    <polygon points="-88,-130 -70,-190 -42,-138" fill="#ff6b6b" opacity="0.4"/>
    <polygon points="88,-130 70,-190 42,-138" fill="#ff6b6b" opacity="0.4"/>

    <!-- Head shape -->
    <ellipse cx="0" cy="-60" rx="105" ry="90" fill="#e94560"/>

    <!-- Cheek fur (wider at bottom) -->
    <ellipse cx="-65" cy="-20" rx="50" ry="45" fill="#e94560"/>
    <ellipse cx="65" cy="-20" rx="50" ry="45" fill="#e94560"/>

    <!-- Snout / face mask -->
    <ellipse cx="0" cy="-25" rx="55" ry="50" fill="#e0e0e0"/>

    <!-- Forehead stripe -->
    <path d="M0,-145 L-15,-90 L0,-100 L15,-90 Z" fill="#e0e0e0" opacity="0.9"/>

    <!-- Eyes -->
    <g>
      <!-- Eye shapes (angular/fierce) -->
      <path d="M-50,-72 Q-38,-90 -22,-72 Q-38,-60 -50,-72Z" fill="#1a1a2e"/>
      <path d="M50,-72 Q38,-90 22,-72 Q38,-60 50,-72Z" fill="#1a1a2e"/>
      <!-- Eye shine -->
      <circle cx="-33" cy="-76" r="4" fill="white" opacity="0.9"/>
      <circle cx="33" cy="-76" r="4" fill="white" opacity="0.9"/>
    </g>

    <!-- Nose -->
    <path d="M-10,-28 Q0,-38 10,-28 Q5,-22 0,-20 Q-5,-22 -10,-28Z" fill="#1a1a2e"/>

    <!-- Mouth -->
    <path d="M0,-20 L0,-10" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-12,-10 Q0,-2 12,-10" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Whisker dots -->
    <circle cx="-25" cy="-15" r="2.5" fill="#1a1a2e" opacity="0.4"/>
    <circle cx="-35" cy="-10" r="2.5" fill="#1a1a2e" opacity="0.4"/>
    <circle cx="-30" cy="-20" r="2.5" fill="#1a1a2e" opacity="0.4"/>
    <circle cx="25" cy="-15" r="2.5" fill="#1a1a2e" opacity="0.4"/>
    <circle cx="35" cy="-10" r="2.5" fill="#1a1a2e" opacity="0.4"/>
    <circle cx="30" cy="-20" r="2.5" fill="#1a1a2e" opacity="0.4"/>
  </g>

  <!-- Subtle "7" in bottom of gear -->
  <text x="256" y="420" text-anchor="middle" font-family="Segoe UI, Arial" font-size="60" font-weight="900" fill="#e0e0e0" opacity="0.15">7</text>
</svg>
